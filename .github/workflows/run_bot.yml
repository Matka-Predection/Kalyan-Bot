name: Run Kalyan Predictor Daily

on:
  schedule:
    # Runs automatically every day at 10:00 PM IST (4:30 PM UTC)
    - cron: '30 16 * * *'
  workflow_dispatch: 

jobs:
  run-script:
    runs-on: ubuntu-latest
    
    # Only use the upgrade flag to avoid configuration conflicts
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repository code
        uses: actions/checkout@v4.2.2

      - name: Set up Python environment
        uses: actions/setup-python@v5.4.0
        with:
          python-version: '3.10'

      - name: Install website reader tools
        run: |
          pip install requests beautifulsoup4

      - name: Run calculation engine and send alerts
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python simple_predict.py
