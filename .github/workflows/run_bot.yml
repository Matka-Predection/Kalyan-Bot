name: Run Kalyan Predictor Daily

on:
  schedule:
    # Runs automatically every day at 10:00 PM IST (4:30 PM UTC)
    - cron: '30 16 * * *'
  workflow_dispatch: 

jobs:
  run-script:
    runs-on: ubuntu-latest

    steps:
      # Use basic tags to let GitHub handle internal compilation cleanly
      - name: Checkout repository code
        uses: actions/checkout@v4

      - name: Set up Python environment
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install website reader tools
        run: |
          pip install requests beautifulsoup4

      - name: Run calculation engine and send alerts
        env:
          # Fixed syntax: Changed double colons to standard dot notation
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python simple_predict.py
