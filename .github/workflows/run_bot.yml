name: Run Kalyan Predictor Daily

on:
  schedule:
    # Trigger 1: 4:00 PM IST (10:30 UTC) | Trigger 2: 6:00 PM IST (12:30 UTC)
    - cron: '30 10 * * *'
    - cron: '30 12 * * *'
  workflow_dispatch: 

jobs:
  run-script:
    runs-on: ubuntu-latest
    
    env:
      TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

    steps:
      - name: Checkout repository code
        uses: actions/checkout@v5

      - name: Install website reader and timezone tools
        run: |
          python3 -m pip install --upgrade pip
          pip3 install requests beautifulsoup4 pytz

      - name: Run calculation engine and send alerts
        run: python3 simple_predict.py
