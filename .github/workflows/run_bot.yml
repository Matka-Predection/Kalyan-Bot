name: Run Live Kalyan Open Tracker Loop

on:
  schedule:
    # Wakes up automatically Monday to Friday at 3:40 PM IST (10:10 AM UTC)
    - cron: '10 10 * * 1-5'
  workflow_dispatch: 

jobs:
  run-script:
    runs-on: ubuntu-latest
    
    env:
      TELEGRAM_TOKEN: ${{ secrets.MY_SECRET_BOT_KEY }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

    steps:
      - name: Checkout repository code
        uses: actions/checkout@v5

      - name: Install website reader and timezone tools
        run: |
          python3 -m pip install --upgrade pip
          pip3 install requests beautifulsoup4 pytz

      - name: Start Realtime Monitoring Open Loop
        run: python3 simple_predict.py

      - name: Save Tracking State
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@://github.com"
          git add last_msg_id.txt || true
          git commit -m "Update tracking state [skip ci]" || true
          git push || true
