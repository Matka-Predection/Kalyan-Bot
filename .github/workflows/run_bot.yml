name: Run Kalyan Predictor Daily

on:
  schedule:
    - cron: '30 16 * * *'
  workflow_dispatch: 

jobs:
  run-script:
    runs-on: ubuntu-latest

    steps:
      # Native Node 24 action (No warnings)
      - name: Checkout repository code
        uses: actions/checkout@v5

      # Bypasses setup-python to use the pre-installed system Python cleanly
      - name: Install website reader tools
        run: |
          python3 -m pip install --upgrade pip
          pip3 install requests beautifulsoup4

      - name: Run calculation engine and send alerts
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python3 simple_predict.py
